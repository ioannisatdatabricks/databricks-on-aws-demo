bundle:
  name: dbs-on-aws-webinar-demo

variables:
  catalog:
    default: main
    description: Unity Catalog catalog name
  schema:
    default: aws_webinar_demo
    description: Schema / database name
  volume:
    default: raw_data
    description: UC volume name for raw data files
  alert_email:
    default: ""
    description: Email address for job failure notifications

workspace:
  root_path: ~/${bundle.name}/${bundle.target}

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: main
      schema:  aws_webinar_demo_dev

  prod:
    mode: production
    variables:
      catalog: main
      schema:  aws_webinar_demo

include:
  - resources/*.yml
