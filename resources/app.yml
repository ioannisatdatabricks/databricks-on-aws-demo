resources:
  apps:
    shopnow_ops_hub:
      name: "shopnow-ops-hub"
      description: "ShopNow Ops Hub — Live KPIs and AI Agent"

      source_code_path: ../src/06-app

      config:
        command:
          - "uvicorn"
          - "app:app"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
        env:
          - name: AGENT_ENDPOINT
            value: "shopnow-ops-agent"
          - name: UC_SCHEMA
            value: ${var.schema}
          - name: PGHOST
            value: "pending"
          - name: PGUSER
            value: "pending"
          - name: PGPASSWORD
            value: "pending"
