# Lakebase Autoscaling project — created by the bundle; reverse ETL notebook
# uses this project instead of creating it. Requires Databricks CLI 0.287.0+.
# See: https://docs.databricks.com/aws/en/oltp/projects/manage-with-bundles
resources:
  postgres_projects:
    shopnow_lakebase:
      project_id: shopnow-lakebase
      display_name: "[${bundle.target}] ShopNow Lakebase"
      pg_version: 16
      default_endpoint_settings:
        autoscaling_limit_min_cu: 0.5   # scale to zero when idle
        autoscaling_limit_max_cu: 4
